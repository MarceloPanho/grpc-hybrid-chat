# ============================================================================
#  docker-compose.yml — orquestra os três serviços do laboratório.
#
#    node-server  → microsserviço gRPC interno (Node.js)         :50051
#    laravel-fpm  → borda pública (PHP-FPM)                       :9000 (interno)
#    nginx        → proxy reverso, único exposto ao host          :80
#
#  Todos na mesma rede interna; só o Nginx (80) e o gRPC (50051, p/ grpcurl)
#  são publicados no host.
# ============================================================================
services:
  node-server:
    build: ./node-server
    container_name: grpc-node-server
    # Monta o contrato compartilhado dentro do container.
    volumes:
      - ./proto:/proto:ro
    ports:
      - "50051:50051"   # exposto só para testar com grpcurl
    networks:
      - chat-net
    # ------------------------------------------------------------------
    #  Health check: verifica se a porta 50051 está aceitando conexões.
    #  Usa um one-liner Node (não há curl gRPC nativo). O laravel-fpm
    #  só sobe depois que este check passar.
    # ------------------------------------------------------------------
    healthcheck:
      test: ["CMD", "node", "-e", "require('net').connect(50051,'127.0.0.1').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  laravel-fpm:
    build: ./laravel-client
    container_name: grpc-laravel-fpm
    volumes:
      - ./laravel-client:/var/www/html
      - ./proto:/var/www/proto:ro   # contrato p/ o protoc gerar as classes
    environment:
      - GRPC_SERVER_HOST=node-server
      - GRPC_SERVER_PORT=50051
    depends_on:
      node-server:
        condition: service_healthy   # espera o health check do Node passar
    networks:
      - chat-net

  nginx:
    image: nginx:1.27-alpine
    container_name: grpc-nginx
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./laravel-client:/var/www/html
    ports:
      - "8080:80"   # host 8080 → container 80 (porta 80 do host costuma estar ocupada)
    depends_on:
      - laravel-fpm
    networks:
      - chat-net

networks:
  chat-net:
    driver: bridge
