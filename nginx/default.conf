# Configuração do Nginx — proxy reverso na frente do PHP-FPM.
server {
    listen 80;
    server_name _;

    # Raiz pública do Laravel.
    root /var/www/html/public;
    index index.php;

    # Tamanho de upload (forms simples; ajuste se precisar).
    client_max_body_size 10m;

    # ------------------------------------------------------------------
    #  Rota de SSE — /stream
    #  O streaming exige que o Nginx NÃO acumule a resposta em buffer,
    #  senão os eventos não chegam em tempo real ao browser.
    # ------------------------------------------------------------------
    location = /stream {
        include fastcgi_params;
        fastcgi_pass laravel-fpm:9000;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;

        # Desliga TODO buffer/cache para o fluxo SSE sair na hora.
        fastcgi_buffering off;
        fastcgi_cache off;
        gzip off;
        # Header reconhecido por proxies para não bufferizar.
        add_header X-Accel-Buffering no;

        # Conexão de longa duração: timeouts generosos.
        fastcgi_read_timeout 3600s;
        fastcgi_send_timeout 3600s;
        proxy_read_timeout 3600s;
    }

    # ------------------------------------------------------------------
    #  Roteamento padrão do Laravel (front controller).
    # ------------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Repasse de qualquer .php para o PHP-FPM.
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass laravel-fpm:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # Bloqueia acesso a arquivos ocultos (.env, .git, etc.).
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
